<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手写轨迹采集 - 完整功能版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f0f2f5;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            padding: 24px;
            max-width: 900px;
            width: 100%;
        }
        
        h2 {
            margin: 0 0 16px 0;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 画板容器 */
        .canvas-wrapper {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            background: #ffffff;
            cursor: crosshair;
            width: 100%;
            height: 0;
            padding-bottom: 50%;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: white;
            pointer-events: none;
        }
        
        .toolbar {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        button {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s ease;
            min-width: 80px;
            justify-content: center;
        }
        
        button:active {
            background: #f1f5f9;
            transform: scale(0.98);
        }
        
        button.primary {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
        }
        
        button.primary:active {
            background: #1d4ed8;
        }
        
        .stats {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.95rem;
            margin-left: auto;
        }
        
        .stats span {
            font-weight: 600;
            color: #0f172a;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 30px;
            align-items: center;
            padding: 10px 0;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .checkbox-item label {
            cursor: pointer;
            user-select: none;
        }
        
        .pressure-indicator {
            background: #e0f2fe;
            color: #0369a1;
            padding: 6px 16px;
            border-radius: 20px;
            margin-left: auto;
        }
        
        pre {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 14px;
            padding: 14px;
            margin-top: 16px;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
        }

        .debug-info {
            margin-top: 12px;
            padding: 8px;
            background: #f8fafc;
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>✍️ 手写轨迹采集</h2>

        <div id="canvasWrapper" class="canvas-wrapper">
            <canvas id="signatureCanvas" width="800" height="400"></canvas>
        </div>

        <div class="toolbar">
            <button id="clearBtn">🗑️ 清空</button>
            <button id="undoBtn">↩️ 撤销</button>
            <button id="exportBtn" class="primary">📥 导出JSON</button>
            <button id="copyBtn">📋 复制数据</button>
            <div class="stats">
                <span id="pointCount">0</span> 点 · <span id="strokeCount">0</span> 笔
            </div>
        </div>

        <div class="controls">
            <div class="checkbox-item">
                <input type="checkbox" id="collectHoverCheckbox" checked>
                <label for="collectHoverCheckbox">采集悬停</label>
            </div>
            <div class="checkbox-item">
                <input type="checkbox" id="realTimeCheckbox" checked>
                <label for="realTimeCheckbox">实时显示</label>
            </div>
            <span class="pressure-indicator" id="pressureDisplay">压力: 0.5</span>
        </div>

        <div class="debug-info" id="debugInfo">状态: 就绪</div>
        <pre id="previewArea">[等待采集...]</pre>
    </div>

    <script>
        (function() {
            "use strict";

            // 点类
            class Point {
                constructor(x, y, t, p = 0.5) {
                    this.x = Math.round(x * 10) / 10;  // 保留一位小数
                    this.y = Math.round(y * 10) / 10;
                    this.t = Math.round(t);  // 时间戳
                    this.p = Math.round(p * 100) / 100;  // 压力保留两位小数
                }
            }

            // 笔画类
            class Stroke {
                constructor(startPoint) {
                    this.points = [startPoint];
                    this.startTime = startPoint.t;
                }
                addPoint(p) { 
                    this.points.push(p); 
                }
                lastPoint() { 
                    return this.points[this.points.length - 1]; 
                }
            }

            // DOM 元素
            const canvas = document.getElementById('signatureCanvas');
            const wrapper = document.getElementById('canvasWrapper');
            const ctx = canvas.getContext('2d');
            const pressureDisplay = document.getElementById('pressureDisplay');
            const debugInfo = document.getElementById('debugInfo');

            // 状态
            let strokes = [];
            let currentStroke = null;
            let isDrawing = false;
            let lastWasHover = false;
            
            const MIN_DIST = 2;
            const MIN_TIME = 8;
            let lastPointTime = 0;

            // UI 元素
            const pointCountSpan = document.getElementById('pointCount');
            const strokeCountSpan = document.getElementById('strokeCount');
            const previewArea = document.getElementById('previewArea');
            const collectHoverCheckbox = document.getElementById('collectHoverCheckbox');
            const realTimeCheckbox = document.getElementById('realTimeCheckbox');
            const clearBtn = document.getElementById('clearBtn');
            const undoBtn = document.getElementById('undoBtn');
            const exportBtn = document.getElementById('exportBtn');
            const copyBtn = document.getElementById('copyBtn');

            // 更新调试信息
            function updateDebug(message) {
                debugInfo.textContent = `状态: ${message} | 绘制: ${isDrawing} | 悬停: ${collectHoverCheckbox.checked} | 实时: ${realTimeCheckbox.checked}`;
                console.log('调试:', message);
            }

            // 获取坐标
            function getCanvasCoords(e) {
                let clientX, clientY, pressure = 0.5;

                if (e.touches) {
                    const touch = e.touches[0];
                    if (!touch) return null;
                    clientX = touch.clientX;
                    clientY = touch.clientY;
                    if (touch.force !== undefined && touch.force > 0) {
                        pressure = Math.min(touch.force, 1.0);
                    }
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const rect = canvas.getBoundingClientRect();
                
                if (clientX < rect.left || clientX > rect.right || 
                    clientY < rect.top || clientY > rect.bottom) {
                    return null;
                }
                
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                pressureDisplay.textContent = `压力: ${pressure.toFixed(2)}`;

                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY,
                    pressure
                };
            }

            // 更新预览
            function updatePreview() {
                const totalPoints = strokes.reduce((acc, s) => acc + s.points.length, 0) + (currentStroke ? currentStroke.points.length : 0);
                pointCountSpan.innerText = totalPoints;
                strokeCountSpan.innerText = strokes.length + (currentStroke ? 1 : 0);

                if (totalPoints > 0) {
                    const lastStroke = currentStroke || strokes[strokes.length - 1];
                    if (lastStroke && lastStroke.points.length > 0) {
                        const last = lastStroke.points[lastStroke.points.length - 1];
                        previewArea.innerText = `最新点: (${last.x}, ${last.y}) 压力:${last.p} 时间:${last.t}`;
                    }
                } else {
                    previewArea.innerText = '[等待采集...]';
                }
            }

            // 重绘
            function redraw() {
                if (!realTimeCheckbox.checked) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    return;
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // 绘制已完成笔画
                for (const stroke of strokes) {
                    if (stroke.points.length < 2) continue;
                    ctx.beginPath();
                    ctx.strokeStyle = '#2563eb';
                    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                    for (let i = 1; i < stroke.points.length; i++) {
                        ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
                    }
                    ctx.stroke();
                }

                // 绘制当前笔画
                if (currentStroke && currentStroke.points.length >= 2) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#dc2626';
                    ctx.moveTo(currentStroke.points[0].x, currentStroke.points[0].y);
                    for (let i = 1; i < currentStroke.points.length; i++) {
                        ctx.lineTo(currentStroke.points[i].x, currentStroke.points[i].y);
                    }
                    ctx.stroke();
                }
            }

            // 添加点
            function addPoint(e) {
                e.preventDefault();
                
                if (!isDrawing && !collectHoverCheckbox.checked) return;

                const coords = getCanvasCoords(e);
                if (!coords) return;

                const now = performance.now();
                if (now - lastPointTime < 4) return;
                lastPointTime = now;

                if (isDrawing) {
                    // 绘制模式
                    if (!currentStroke) {
                        currentStroke = new Stroke(new Point(coords.x, coords.y, now, coords.pressure));
                    } else {
                        const last = currentStroke.lastPoint();
                        const dx = coords.x - last.x;
                        const dy = coords.y - last.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist >= MIN_DIST) {
                            currentStroke.addPoint(new Point(coords.x, coords.y, now, coords.pressure));
                        }
                    }
                    lastWasHover = false;
                } else if (collectHoverCheckbox.checked) {
                    // 悬停模式
                    if (!lastWasHover) {
                        if (currentStroke) {
                            strokes.push(currentStroke);
                            currentStroke = null;
                        }
                        strokes.push(new Stroke(new Point(coords.x, coords.y, now, coords.pressure)));
                        lastWasHover = true;
                    } else {
                        const lastStroke = strokes[strokes.length - 1];
                        const last = lastStroke.lastPoint();
                        const dx = coords.x - last.x;
                        const dy = coords.y - last.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist >= MIN_DIST) {
                            lastStroke.addPoint(new Point(coords.x, coords.y, now, coords.pressure));
                        }
                    }
                }

                updatePreview();
                redraw();
            }

            // 开始绘制
            function startDraw(e) {
                e.preventDefault();
                
                const coords = getCanvasCoords(e);
                if (!coords) return;

                const now = performance.now();
                lastPointTime = now;

                if (currentStroke) {
                    strokes.push(currentStroke);
                }
                
                currentStroke = new Stroke(new Point(coords.x, coords.y, now, coords.pressure));
                isDrawing = true;
                lastWasHover = false;

                updatePreview();
                redraw();
                updateDebug('开始绘制');
            }

            // 结束绘制
            function endDraw(e) {
                e?.preventDefault();
                
                if (isDrawing && currentStroke) {
                    strokes.push(currentStroke);
                    currentStroke = null;
                }
                isDrawing = false;
                lastWasHover = false;
                
                updatePreview();
                redraw();
                updateDebug('结束绘制');
            }

            // 导出JSON
            function exportJSON() {
                // 收集所有笔画
                const allStrokes = [...strokes];
                if (currentStroke) {
                    allStrokes.push(currentStroke);
                }

                // 构建导出数据
                const exportData = {
                    meta: {
                        canvasWidth: canvas.width,
                        canvasHeight: canvas.height,
                        exportTime: new Date().toISOString(),
                        totalStrokes: allStrokes.length,
                        totalPoints: allStrokes.reduce((acc, s) => acc + s.points.length, 0)
                    },
                    strokes: allStrokes.map(stroke => ({
                        startTime: stroke.startTime,
                        points: stroke.points.map(p => ({
                            x: p.x,
                            y: p.y,
                            t: p.t,
                            p: p.p
                        }))
                    }))
                };

                return JSON.stringify(exportData, null, 2);
            }

            // 下载JSON文件
            function downloadJSON() {
                try {
                    const jsonStr = exportJSON();
                    const blob = new Blob([jsonStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `handwriting_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    updateDebug('JSON导出成功');
                } catch (err) {
                    console.error('导出失败:', err);
                    alert('导出失败: ' + err.message);
                    updateDebug('导出失败');
                }
            }

            // 复制到剪贴板
            async function copyToClipboard() {
                try {
                    const jsonStr = exportJSON();
                    await navigator.clipboard.writeText(jsonStr);
                    alert('已复制到剪贴板');
                    updateDebug('复制成功');
                } catch (err) {
                    console.error('复制失败:', err);
                    // 降级方案
                    try {
                        const jsonStr = exportJSON();
                        const textarea = document.createElement('textarea');
                        textarea.value = jsonStr;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        alert('已复制到剪贴板');
                        updateDebug('复制成功');
                    } catch (fallbackErr) {
                        alert('复制失败，请手动导出');
                        updateDebug('复制失败');
                    }
                }
            }

            // 清空画板
            function clearCanvas() {
                strokes = [];
                currentStroke = null;
                isDrawing = false;
                lastWasHover = false;
                updatePreview();
                redraw();
                updateDebug('已清空');
            }

            // 撤销
            function undo() {
                if (currentStroke) {
                    currentStroke = null;
                    isDrawing = false;
                } else if (strokes.length > 0) {
                    strokes.pop();
                }
                updatePreview();
                redraw();
                updateDebug('撤销');
            }

            // 事件绑定
            function bindEvents() {
                // 画板事件
                wrapper.addEventListener('touchstart', startDraw, { passive: false });
                wrapper.addEventListener('touchmove', addPoint, { passive: false });
                wrapper.addEventListener('touchend', endDraw, { passive: false });
                wrapper.addEventListener('touchcancel', endDraw, { passive: false });
                
                wrapper.addEventListener('mousedown', startDraw);
                wrapper.addEventListener('mousemove', addPoint);
                wrapper.addEventListener('mouseup', endDraw);
                wrapper.addEventListener('mouseleave', endDraw);

                // 按钮事件
                clearBtn.addEventListener('click', clearCanvas);
                undoBtn.addEventListener('click', undo);
                exportBtn.addEventListener('click', downloadJSON);
                copyBtn.addEventListener('click', copyToClipboard);

                // 复选框事件
                collectHoverCheckbox.addEventListener('change', function() {
                    updateDebug(`悬停采集: ${this.checked}`);
                });
                
                realTimeCheckbox.addEventListener('change', function() {
                    updateDebug(`实时显示: ${this.checked}`);
                    redraw();
                });
            }

            // 启动
            bindEvents();
            clearCanvas();
            updateDebug('就绪');
        })();
    </script>
</body>
</html>
